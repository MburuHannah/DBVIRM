{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landlord Signup | DBVIRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f8ff; min-height: 100vh; display: flex; align-items: center; }
        .gradient-custom {
            background: linear-gradient(90deg, #0066cc, #00cc99);
        }
        .card { border-radius: 15px; border: none; overflow: hidden; }
        .btn-primary { background-color: #0066cc; border: none; }
        .btn-primary:hover { background-color: #004d99; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="gradient-custom p-4 text-center text-white">
                    <h3 class="fw-bold">Join DBVIRM</h3>
                    <p class="mb-0">Create your Landlord account</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors.0 }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}
                        <button type="submit" class="btn btn-primary w-100 py-2">Sign Up</button>
                    </form>
                </div>
                <div class="card-footer bg-white text-center py-3">
                    <small>Already have an account? <a href="{% url 'login' %}" class="text-primary">Login</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
