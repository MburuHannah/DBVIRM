<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}DBVIRM{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .sidebar { height: 100vh; background-color: #198754; color: white; position: fixed; width: 250px; z-index: 1000; }
        .main-content { margin-left: 250px; padding: 30px; background-color: #f8f9fa; min-height: 100vh; }
        .nav-link { color: white !important; opacity: 0.8; transition: 0.3s; }
        .nav-link:hover { opacity: 1; background: rgba(255, 255, 255, 0.15); border-radius: 8px; }
        .nav-link.active { background: white !important; color: #198754 !important; font-weight: bold; border-radius: 8px; opacity: 1; }
    </style>
</head>
<body>

<div class="sidebar d-flex flex-column p-3 shadow">
    <h3 class="fw-bold mb-4 text-center border-bottom pb-3">DBVIRM</h3>
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item mb-2">
            <a href="{% url 'landlord_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'landlord_dashboard' %}active{% endif %}">
                <i class="bi bi-speedometer2 me-2"></i> Dashboard
            </a>
        </li>
        <li class="nav-item mb-2">
            <a href="{% url 'manage_units' %}" class="nav-link {% if request.resolver_match.url_name == 'manage_units' %}active{% endif %}">
                <i class="bi bi-houses me-2"></i> Manage Units
            </a>
        </li>
        <li class="nav-item mb-2">
            <a href="{% url 'maintenance_list' %}" class="nav-link {% if request.resolver_match.url_name == 'maintenance_list' %}active{% endif %}">
                <i class="bi bi-tools me-2"></i> Maintenance
            </a>
        </li>
        <li class="nav-item mb-2">
            <a href="{% url 'global_payments' %}" class="nav-link {% if request.resolver_match.url_name == 'global_payments' %}active{% endif %}">
                <i class="bi bi-cash-stack me-2"></i> Global Payments
            </a>
        </li>
        <hr>
        <li class="nav-item mb-2">
            <a href="{% url 'index' %}" class="nav-link text-white-50 small">
                <i class="bi bi-house-door me-2"></i> Home
            </a>
        </li>
    </ul>
    <div class="mt-auto p-2">
        <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-light w-100">Logout</a>
    </div>
</div>

<div class="main-content">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
