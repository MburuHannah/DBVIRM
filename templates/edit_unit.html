<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Unit | DBVIRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --landlord-green: #198754; --landlord-dark: #0f5132; }
        body { background-color: #f8f9fa; }
        .sidebar { height: 100vh; background-color: var(--landlord-dark); color: white; position: fixed; width: 260px; }
        .main-content { margin-left: 260px; padding: 40px; }
        .card { border-radius: 15px; border: none; }
        .btn-save { background-color: var(--landlord-green); color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar d-flex flex-column p-4">
    <h3 class="fw-bold mb-4 border-bottom pb-3 text-center">DBVIRM</h3>
    <ul class="nav nav-pills flex-column mb-auto">
        <li><a href="{% url 'landlord_dashboard' %}" class="nav-link text-white"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
    </ul>
</div>

<div class="main-content">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark">Edit Unit Details</h2>
            <a href="{% url 'landlord_dashboard' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm p-4">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Unit Name/Number</label>
                            {{ form.unit_name }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">House Type</label>
                            {{ form.house_type }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Monthly Rent (KES)</label>
                            {{ form.rent }}
                        </div>
                        <button type="submit" class="btn btn-save w-100 py-2">Save Changes</button>
                    </form>
                </div>
            </div>
            <div class="col-md-5 offset-md-1">
                <div class="alert alert-info border-0 shadow-sm">
                    <h6 class="fw-bold"><i class="bi bi-info-circle me-2"></i> Quick Tip</h6>
                    Changing the rent here will update the "Total Due" for the tenant on their next billing cycle.
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
