<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tenant Created Successfully | DBVIRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f0fdf4;"> <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5 text-center">
                        <div class="mb-4">
                            <div class="bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                                <h1 class="mb-0">✓</h1>
                            </div>
                        </div>

                        <h2 class="fw-bold text-success mb-3">Tenant Registered!</h2>
                        <p class="text-muted">Account for <strong>{{ tenant_name }}</strong> has been created.</p>

                        <div class="alert alert-warning border-0 py-4 my-4">
                            <h6 class="text-uppercase fw-bold mb-2">Temporary Password</h6>
                            <h2 class="display-6 fw-bold text-dark" id="tempPass">{{ temp_password }}</h2>
                            <p class="small mb-0 text-danger">Please copy this password now. It will not be shown again.</p>
                        </div>

                        <div class="d-grid gap-2">
                            <button onclick="copyPassword()" class="btn btn-outline-success">Copy Password</button>
                            <a href="{% url 'landlord_dashboard' %}" class="btn btn-success">Go to Dashboard</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyPassword() {
            var passText = document.getElementById("tempPass").innerText;
            navigator.clipboard.writeText(passText);
            alert("Password copied to clipboard!");
        }
    </script>
</body>
</html>
