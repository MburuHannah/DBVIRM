<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Rental Unit | DBVIRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f8f9fa;">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
            <div class="card shadow-sm border-0">
    <div class="card-header bg-success text-white p-3">
        <h5 class="mb-0">Create New Rental Unit</h5>
    </div>
    <div class="card-body p-4">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Unit Number / Name</label>
                {{ form.unit_name }}
            </div>

            <div class="mb-3">
                <label class="form-label">House Type</label>
                {{ form.house_type }}
            </div>

            <div class="mb-3">
                <label class="form-label">Monthly Rent (KES)</label>
                {{ form.rent }}
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success flex-grow-1">Save Unit</button>
                <a href="{% url 'landlord_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
        </div>
    </div>
</body>
</html>
