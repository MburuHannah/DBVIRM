<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tenant Dashboard | DBVIRM Error Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --tenant-blue: #0d6efd; --tenant-dark: #084298; }
        body { background-color: #f0f7ff; }
        .sidebar { height: 100vh; background-color: var(--tenant-dark); color: white; position: fixed; width: 260px; z-index: 1000; }
        .main-content { margin-left: 260px; padding: 40px; min-height: 100vh; }
        .nav-link { color: rgba(255,255,255,0.8); margin-bottom: 10px; border-radius: 8px; }
        .nav-link.active { background: rgba(255,255,255,0.1); color: white; }

        /* ERROR SPECIFIC STYLING */
        .card-stat { border-top: 4px solid #dc3545 !important; border-radius: 15px; }
        .error-alert {
            background-color: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
        }
        .input-error { border: 2px solid #dc3545 !important; }
        .btn-pay { background-color: var(--tenant-blue); color: white; font-weight: bold; border-radius: 10px; }

        @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; } .main-content { margin-left: 0; } }
    </style>
</head>
<body>

<div class="sidebar d-flex flex-column p-4 shadow">
    <h3 class="fw-bold mb-4 text-center border-bottom pb-3">DBVIRM</h3>
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item"><a href="#" class="nav-link active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
        <li><a href="#" class="nav-link"><i class="bi bi-receipt me-2"></i> Payment History</a></li>
        <li><a href="#" class="nav-link"><i class="bi bi-tools me-2"></i> Maintenance</a></li>
    </ul>
    <div class="mt-auto">
        <p class="small mb-1 opacity-75">Logged in as:</p>
        <p class="fw-bold mb-3">Hannah Wanjiru</p>
        <button class="btn btn-outline-light btn-sm w-100">Logout</button>
    </div>
</div>

<div class="main-content">
    <div class="mb-5">
        <h2 class="fw-bold text-dark">Rent Payment Portal</h2>
        <p class="text-muted">Unit: <strong>Umoja 3 - House A4</strong></p>
    </div>

    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="error-alert">
                <i class="bi bi-exclamation-octagon-fill me-2"></i>
                Error: Payment amount (KES 20,000) exceeds your outstanding balance.
            </div>

            <div class="card border-0 shadow card-stat p-4">
                <div class="text-center">
                    <h6 class="text-uppercase text-muted fw-bold mb-3">Outstanding Balance</h6>
                    <h1 class="display-5 fw-bold text-dark mb-4">KES 15,000.00</h1>
                </div>

                <form>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Enter Amount to Pay</label>
                        <input type="number" class="form-control form-control-lg input-error" value="20000">
                        <div class="text-danger small mt-1">Please enter an amount less than or equal to 15,000.</div>
                    </div>

                    <button type="button" class="btn btn-pay w-100 py-3 shadow-sm">
                        <i class="bi bi-phone me-2"></i> RETRY PAYMENT
                    </button>
                </form>

                <div class="mt-4 pt-3 border-top text-center">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/M-PESA_LOGO-01.svg/512px-M-PESA_LOGO-01.svg.png"
                         alt="M-Pesa" style="height: 30px; opacity: 0.6;">
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
