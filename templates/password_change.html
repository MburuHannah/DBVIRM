{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Your Account | DBVIRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f8ff; min-height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 15px; border: none; }
        .text-primary-custom { color: #0066cc; }
        .btn-primary { background-color: #0066cc; border: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary-custom">Security Check</h3>
                    <p class="text-muted">Since this is your first login, please set a new private password.</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-3">Update & Enter Dashboard</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
