{% extends 'base_landlord.html' %}

{% block content %}
<div class="container-fluid">
    <h2 class="fw-bold text-dark mb-4">Executive Overview</h2>
    
    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 p-3 bg-white" style="border-left: 5px solid #198754;">
                <small class="text-muted fw-bold">PORTFOLIO</small>
                <h3 class="fw-bold">{{ total_units }} Units</h3>
                <a href="{% url 'manage_units' %}" class="small text-success text-decoration-none">View All →</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-0 p-3 bg-white" style="border-left: 5px solid #0d6efd;">
                <small class="text-muted fw-bold">MAINTENANCE</small>
                <h3 class="fw-bold text-primary">{{ pending_count }} Pending</h3>
                <a href="{% url 'maintenance_list' %}" class="small text-primary text-decoration-none">Manage Issues →</a>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm p-4 bg-white">
        <h5 class="fw-bold mb-3">Quick Actions</h5>
        <div class="d-flex gap-3">
            <a href="{% url 'add_unit' %}" class="btn btn-success btn-lg"><i class="bi bi-house-add"></i> Add Unit</a>
            <a href="{% url 'add_tenant' %}" class="btn btn-outline-success btn-lg"><i class="bi bi-person-plus"></i> Register Tenant</a>
        </div>
    </div>
</div>
{% endblock %}
